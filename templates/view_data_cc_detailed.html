<!DOCTYPE html>

  <style>
    /* Center the loader */
    .loader {
      position: absolute;
      left: 50%;
      top: 50%;
      border: 16px solid #f3f3f3; /* Light grey */
      border-top: 16px solid #000E2F; /* Blue */
      border-bottom: 16px solid #000E2F;
      border-radius: 50%;
      width: 120px;
      height: 120px;
      animation: spin 2s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    </style>
